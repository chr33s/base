name: Main Action

on:
  push:
    branches:
      - main

env:
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "12.x"
      - run: npm install
      - run: npm run build
      - run: npm run deploy
